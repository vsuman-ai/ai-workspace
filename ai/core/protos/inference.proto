syntax = "proto3";

package core.protos;

message TensorShape {
  repeated int64 dims = 1;
}

message Tensor {
  string name = 1;
  string datatype = 2;
  TensorShape shape = 3;
  bytes raw_data = 4;
}

message TritonInferenceRequest {
  string model_name = 1;
  repeated Tensor inputs = 2;
  repeated string output_names = 3;
}

message TritonInferenceResponse {
  string model_name = 1;
  repeated Tensor outputs = 2;
}